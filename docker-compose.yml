services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fbauto
      POSTGRES_USER: fbauto
      POSTGRES_PASSWORD: fbauto_secret
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  server:
    build: ./server
    env_file: .env
    depends_on: [postgres, redis]
    ports: ["8080:8080"]
    volumes:
      - ./storage:/app/storage
      - ./profiles:/app/profiles
      - ./logs:/app/logs
  worker:
    build: ./worker
    env_file: .env
    depends_on: [postgres, redis]
    volumes:
      - ./storage:/app/storage
      - ./profiles:/app/profiles
      - ./logs:/app/logs
  web:
    build: ./web
    depends_on: [server]
    ports: ["5173:5173"]
volumes:
  pgdata:
